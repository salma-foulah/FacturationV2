# ============================================================
# FacturePro - Application Properties
# ============================================================

spring.application.name=FacturePro

# ============================================================
# H2 IN-MEMORY DATABASE (désactivé)
# ============================================================
# spring.datasource.url=jdbc:h2:mem:facturepro;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.h2.console.enabled=true

# ============================================================
# POSTGRESQL
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/facturepro
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=salma
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ============================================================
# JPA / HIBERNATE
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================================
# JWT CONFIGURATION
# ============================================================
app.jwt.secret=FactureProSuperSecretKeyForJWTTokenGeneration2024MustBe256BitsLong!!
app.jwt.expiration=86400000

# ============================================================
# LOGGING
# ============================================================
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ============================================================
# SERVER
# ============================================================
server.port=8080
